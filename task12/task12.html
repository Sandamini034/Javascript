<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Image</title>
  <link rel="stylesheet" href="style.css">
</head>

<header>
  <h1>Crop Image</h1>
</header><br>
<div id="container1">
  <input type="file" id="chooseFile" onchange="draw()">
  <button class='btn' id="btn1">Select an image</button>
  <br><br>
  <div id="wrapper">
    <canvas id="canvas1" width=420 heigth=200></canvas>
    <div id="rect" style="display:none;"></div>
  </div>
  <img id="uploadedImage">
</div>
<div id="container2">
  <br>
  <hr style="border: 2px solid #2e2eff; width:70%">
  <label id="label1">Cropped Image</label><br>
  <canvas id="canvas2" width=100 height=100></canvas>
  <img id="croppedImage">
  <label id="label2">X</label>
  <input class="box" type="text" id="x" placeholder="0" readonly>
  <label id="label3">Y</label>
  <input class="box" type="text" id="y" placeholder="0" readonly><br>
  <label id="label4">Width</label>
  <input class="box" type="text" id="width" placeholder="Width" readonly>
  <label id="label5">Height</label>
  <input class="box" type="text" id="height" placeholder="Height" readonly><br>
  <button class="btn" id="Download">Download image</button>
  <br>
</div>

<body>
  <script>
    const container = document.querySelector('#container1');
    const inputFile = document.querySelector("#chooseFile");
    const btn = document.querySelector("#btn1");
    btn.addEventListener('click', () => inputFile.click());
    const c = document.querySelector("#canvas1");
    const ctx = c.getContext("2d");
    const uploadedImage = document.querySelector('#uploadedImage');
    const rect = document.querySelector('#rect');

    c.height = 200;
    console.log(c.height);
    document.getElementById('width').value = c.width;
    document.getElementById('height').value = c.height;

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    c.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;
      if (files.length === 0) { return }
      window.alert("File dropped: " + files.length);
      console.log(e);
    });

    document.documentElement.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file) {
        inputFile.files = e.dataTransfer.files;
        draw();
      }
    });
    function draw() {
      const file = inputFile.files[0];
      if (!file) {
        alert('Please select a file');
        return;
      }

      if (!file.name.endsWith('.png') && !file.name.endsWith('.jpg') && !file.name.endsWith('.jpeg')) {
        alert('Please select a png or jpg or jpeg file');
        return;
      }

      uploadedImage.onload = () => {
        c.width = uploadedImage.width;
        c.height = uploadedImage.height;
        ctx.drawImage(uploadedImage, 0, 0, c.width, c.height);
        document.getElementById('width').value = c.width;
        document.getElementById('height').value = c.height;
      }
      uploadedImage.src = URL.createObjectURL(file);
    }

    const c1 = document.querySelector('#canvas2');
    const ctx2 = c1.getContext('2d');
    let isDragged = false;
    let activeRect = null;

    let x = 0;
    let y = 0;
    let endX = 0;
    let endY = 0;
    let width = 0;
    let height = 0;
    let originX = 0;
    let originY = 0;

    const setDimensions = () => {
      originX = Math.min(x, endX);
      originY = Math.min(y, endY);
      width = Math.abs(endX - x);
      height = Math.abs(endY - y);
    }

    const updateSelection = (isShow) => {
      if (isShow) {
        rect.style.left = `${originX}px`;
        rect.style.top = `${originY}px`;
        rect.style.width = `${width}px`;
        rect.style.height = `${height}px`;
        rect.style.display = "block";
        rect.backgroundColor = "blue";
        rect.style.opacity = 0.5;
      } else {
        rect.style.display = "none";
      }
    }

    c.addEventListener('mousedown', event => {
      if (event.button === 0) {
        if (activeRect) {
          activeRect.remove();
          activeRect = false;
        }
        console.log(event);
        isDragged = true;
        x = event.offsetX;
        y = event.offsetY;

        setDimensions();
        updateSelection(false);
        document.getElementById('x').value = Math.round(originX);
        document.getElementById('y').value = Math.round(originY);
      }
    })

    c.addEventListener('mousemove', (e) => {
      if (isDragged) {
        endX = Math.max(0, Math.min(e.offsetX, c.width));
        endY = Math.max(0, Math.min(e.offsetY, c.height));
        setDimensions();
        updateSelection(true);

        document.getElementById('x').value = Math.round(originX);
        document.getElementById('y').value = Math.round(originY);
        document.getElementById('width').value = Math.round(width);
        document.getElementById('height').value = Math.round(height);
      }
    })

    document.addEventListener('mouseup', (e) => {
      if (isDragged) {
        isDragged = false;

        const finalW = Math.abs(width);
        const finalH = Math.abs(height);

        c1.width = finalW;
        c1.height = finalH;

        ctx2.drawImage(
          c,
          originX, originY, finalW, finalH,
          0, 0, finalW, finalH
        );

        updateSelection(false);
        document.getElementById('width').value = finalW;
        document.getElementById('height').value = finalH;
      }

    });

    const downloadBtn = document.getElementById('Download');
    downloadBtn.addEventListener('click', () => {
      if (!c1.width || !c1.height) {
        alert('Please select an area to crop first');
        return;
      }
      const link = document.createElement('a');
      link.download = 'cropped_image.png';
      link.href = c1.toDataURL('image/png');
      link.click();
    });


  </script>
</body>

</html>
