<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption and Decryption</title>
    <style>
        body{
            background:linear-gradient(lightblue,purple);
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        button{
            border-radius:5px;
            padding:5px;
        }

        textarea,input[type="password"],button{
            display:block;
            margin:0 auto 10px auto;
            padding:8px;
            resize:none;
        }
    </style>
</head>
<body>
    
    <textarea id="inputText" placeholder ="Put your source / encrypted content here..." style="text-align:left; width:40em;height: 12em;"></textarea>
    <br>

 <div style="text-align:center;">
    <input type="radio" id="encrypt" name="selection" value="Encrypt">
    <label for="encrypt" >Encrypt</label>

    <input type="radio" id="decrypt" name="selection" value="Decrypt">
    <label for="decrypt">Decrypt</label>
</div>

    <br>

    <input type="password" id="pwd"><br>
    <button id="btn" style="display:block;margin:0 auto;">Encrypt/Decrypt</button><br>
    <textarea id="outputText" placeholder ="Output will be here..." style="
     width:40em;height: 12em; text-align:left;" readonly></textarea>
    
    <script>
        const input = document.getElementById("inputText");
        
        const output = document.getElementById("outputText");

        const password = document.getElementById("pwd");

        document.getElementById("btn").addEventListener("click", function(){

            let inputText =input.value;

            if(inputText.trim().length===0){
            window.alert("Please enter some text to encrypt/decrypt");       
          }
            const selection = document.querySelector('input[name="selection"]:checked').value;
            console.log(inputText);
            console.log(selection);
            let pArray = [];
            for(let element in password){
                pArray.push(password.value.charCodeAt(element));
            }

            if(pArray.length<8 || !/[0-9]/.test(password.value) || !/[A-Z]/.test(password.value)|| !/[a-z]/.test(password.value)){
                window.alert("Password must be greater than 8 characters,cannot be null and "+
                "must contain at least one uppercase letter,one lowercase letter and one number.");
                return;
            }else{
            
            if(selection ===""){
                window.alert("Please select Encrypt or Decrypt");
                return;
            }
          let array = selection==="Encrypt"? 
          inputText.split("").map(char=>char.charCodeAt(0)):
          inputText.split(",").map(Number);

          for(let i=0;i<array.length;i++){
            array[i] =selection==="Encrypt"?
            array[i]+pArray[i%pArray.length]:
            array[i]-pArray[i%pArray.length];
          }

          output.value = selection==="Encrypt"?
          array.join(","):
          String.fromCharCode(...array);
          
        }
        })
        
    </script>
</body>
</html>
