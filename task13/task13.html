<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paint Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<div id="container">
  <header>
    <h1>Painter</h1>
  </header>
  <div id="container1">
    <select name="color" id="select">
      <option value="#fff">White</option>
      <option value="#0f0">Green</option>
      <option value="#00f">Blue</option>
    </select>
    <button id="pencil" class="tool">Pencil</button>
    <button id="eraser" class="tool">Eraser</button>
    <button id="clear" class="tool">Clear</button>
  </div>
  <div id="wrapper">
    <canvas id="canvas" width=500 height=300></canvas>
  </div>
</div>
<script>
  const c = document.querySelector("#canvas");
  const ctx = c.getContext("2d");
  const pencil = document.querySelector('#pencil');
  const eraser = document.querySelector('#eraser');
  const clearBtn = document.querySelector('#clear');
  const selection = document.querySelector('#select');

  let isActive = false;
  let lastX = 0;
  let lastY = 0;
  let pTool = true;
  let eTool = false;

  c.width = window.innerWidth*0.9;
  c.height = window.innerHeight*0.7;

  eraser.addEventListener("click", () => {
    pTool = false;
    eTool = true;
    c.style.cursor = "cell";
  });
  pencil.addEventListener("click", () => {
    pTool = true;
    eTool = false;
    c.style.cursor = "crosshair";
  });
  clearBtn.addEventListener("click", () => {
    ctx.clearRect(0, 0, c.width, c.height);
  });

  c.addEventListener("pointerdown", (e) => {
    isActive = true;
    lastX = e.offsetX;
    lastY = e.offsetY;
  });
  c.addEventListener("pointermove", event => {
    if (!isActive) { return };
    ctx.strokeStyle = selection.value;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    const x = event.offsetX;
    const y = event.offsetY;

    if (pTool) {
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.stroke();
    } else if (eTool) {
      ctx.clearRect(x, y, 20, 20);
    }

    lastX = x;
    lastY = y;
  })

  c.addEventListener("pointerout", () => isActive = false);
  c.addEventListener("pointerup", () => isActive = false);
</script>

</html>
