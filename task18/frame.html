<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="../task17/prism.css" rel="stylesheet">
  <style>
    h3{
      color:#fff;
    }
  </style>
</head>

<body style="background-color: #2e2e2e;">
  <script src="../task17/prism.js"></script>
  <script>
    window.addEventListener("message", event => {
      console.log(event);
      console.log("Data received from parent window:", event.data);
      if (event.data.type === "LOAD_CODE") {
        document.body.innerHTML = event.data.code;
        Prism.highlightAll();
      }
    })
  </script>
</body>

</html>
