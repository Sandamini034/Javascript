<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="../task17/prism.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet">
  <style>
    h3 {
      color: #fff;
    }
  </style>
</head>

<body>
  <pre class="line-numbers"><code id="highlighted" class="language-js"></code></pre>

  <script src="../task17/prism.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
  <script>
    window.addEventListener("load", event => {
      window.parent.postMessage({
        type: "ready"
      }, "*");
    })

    window.addEventListener("message", (e) => {
      console.log(e);
      if (e.data.type === "LOAD_CODE") {

        let code = e.data.code;
        let lang = e.data.lang;

        const codeElement = document.getElementById("highlighted");
        const preElement = codeElement.parentElement;

        codeElement.className = `language-${lang}`;
        preElement.className = `line-numbers language-${lang}`;
        
        codeElement.textContent=code;

        console.log(Prism.plugins.lineNumbers);
        Prism.highlightElement(codeElement);
      }
    })
  </script>
</body>

</html>
