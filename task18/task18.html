<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Messaging</title>
</head>

<body>
  <iframe src="frame.html" width="50%" height="100" style="margin:0"></iframe>
  <script>
    const iframe = document.querySelector('iframe');

    window.addEventListener('message', (e) => {
      console.log(e);
      if (e.data.type === "ready") {
        iframe.contentWindow.postMessage({
          type: "LOAD_CODE",
          code: `p{color:red;}\nh1{color:blue;}`,
          lang:"javascript"
        }, "*");
      }
    });
  </script>
</body>

</html>
