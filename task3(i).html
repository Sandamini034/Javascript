<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;

      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 15px;
      border: none;
      outline: none;

    }

    body {
      background-image: url("colors.webp");
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
      background-size: cover;
    }

    h1 {
      text-align: center;
      color: #7777FF;
      border-style: solid;
      border-radius: 15px;
      width: fit-content;
      margin: 20px auto;
    }

    #output {
      border-radius: 15px;
      width: 100px;
      height: 100px;
      border-style: solid;
    }

    .container input {
      margin: 10px;
      padding: 5px;
      border-radius: 10px;
      border-style: solid;
    }

    .container input[type="color"] {
      width: 100px;
      height: 50px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Color Blender</h1>
  </header>
  <fieldset class="container">
    <input type="color" id="color-a" value="#EBD700">
    <input type="color" id="color-b" value="#0FA9EB">

    <input type="range" id="ratio" min="0" max="1" step="0.1">
    <div id="output"></div>
  </fieldset>
  <script>
    const toRGB = hex => [
      parseInt(hex.substring(1, 3), 16),
      parseInt(hex.substring(3, 5), 16),
      parseInt(hex.substring(5, 7), 16)
    ]

    const outputElement = document.querySelector("#output");

    const colorInputA = document.querySelector("#color-a")
    const colorInputB = document.querySelector("#color-b")
    const ratioInput = document.querySelector("#ratio")

    const blendChannel = (a, b, ratio) => {
      const amonutA = a * ratio;
      const amountB = b * (1 - ratio);

      return Math.round(amonutA + amountB);
    }

    function updateColor() {
      const colorA = toRGB(colorInputA.value);
      const colorB = toRGB(colorInputB.value);
      const ratio = parseFloat(ratioInput.value);

      const outR = blendChannel(colorA[0], colorB[0], ratio);
      const outG = blendChannel(colorA[1], colorB[1], ratio);
      const outB = blendChannel(colorA[2], colorB[2], ratio);

      outputElement.style.background = `rgb(${outR}, ${outG}, ${outB})`
    }

    colorInputA.addEventListener("input", updateColor);
    colorInputB.addEventListener("input", updateColor);
    ratioInput.addEventListener("input", updateColor);
    updateColor();



  </script>
</body>

</html>
