<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption and Decryption</title>
</head>
<body style="background-color: antiquewhite;">
    
    <input id="inputText" style="display:block; margin:0 auto; 
    width:40em;height: 14em; text-align:left;padding:8px;resize:none;">
    
    <br>

 <div style="text-align:center;">
    <input type="radio" id="encrypt" name="selection" value="Encrypt">
    <label for="encrypt" >Encrypt</label>

    <input type="radio" id="decrypt" name="selection" value="Decrypt">
    <label for="decrypt">Decrypt</label>
</div>

    <br>

    <input type="password" id="pwd" style="display:block;margin:0 auto;padding-left:8px"><br>
    <button id="btn" style="display:block;margin:0 auto">Encrypt/Decrypt</button><br>
    <input id="outputText" style="display:block; margin:0 auto; 
    width:40em;height: 14em; text-align:left;padding:8px;resize:none;" readonly>
    <script>
        const input = document.getElementById("inputText");
        input.placeholder ="Put your source / encrypted content here...";
        
        const output = document.getElementById("outputText");
        output.placeholder ="Output will be here...";

        document.getElementById("btn").onclick = function(){
            let inputText =input.value;
            const selection = document.querySelector('input[name="selection"]:checked').value;
            console.log(inputText);
            console.log(selection);
            let pArray = [];
            for(let element in document.getElementById("pwd").value){
                pArray.push(document.getElementById("pwd").value.charCodeAt(element));
            }

            if(pArray.length<8 || pArray.length>10 || pArray.length===0 || /[0-9]/.test(document.getElementById("pwd").value)===false || /[A-Z]/.test(document.getElementById("pwd").value)===false || /[a-z]/.test(document.getElementById("pwd").value)===false){
                window.alert("Password must be greater than 8 characters,cannot be null and must contain at least one uppercase letter, one lowercase letter and one number.");
                return;
            }else{
            
            if(selection ==="Encrypt" && inputText.length>0){

                let mArray =[];

            for(let element in inputText){
                mArray.push(inputText.charCodeAt(element));
            }
            
                for(let element in mArray){
                    mArray[element] = mArray[element] +pArray[element%pArray.length];
                }
                output.value = mArray.join(",");
            }else if(selection ==="Decrypt" && inputText.length>0){

                let dArray = inputText.split(",").map(Number);

           
                for(let element in dArray){
                    dArray[element] = dArray[element] -pArray[element%pArray.length];
                }
                console.log(dArray);
                output.value = String.fromCharCode(...dArray);
            }else if(inputText.length===0){
                window.alert("Please enter some text to encrypt/decrypt");
            }else{
                window.alert("Please select Encrypt or Decrypt");
            }
        }
        }
        
    </script>
</body>
</html>
