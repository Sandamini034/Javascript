<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Frame</title>
  <style>
    #box1 {
      width: 300px;
      height: 100px;
      background-color: #ff0000;
      margin: 200px auto;
      border-radius: 15px;
      border: solid 1px #ffffff;
    }

    body {
      background-color: black;
    }

    h1{
      color:white;
      text-align:center;
      transform:translateY(30px);

    }
  </style>
</head>

<body>
  <header>
    <h1>Animation Frame</h1>
  </header>
  <div id="box1"></div>
  <script>
    const colorHex_A = "#ff0000";
    const colorHex_B = "#0000ff";

    const toRGB = hex => {
      const r = parseInt(hex.slice(1, 3), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, b };
    };

    const colorRGB_R = toRGB(colorHex_A);
    const colorRGB_B = toRGB(colorHex_B);

    const blendColors = (color1, color2, factor) => {
      const r = Math.round(color1.r * (1 - factor));
      const b = Math.round(color2.b * factor);
      return { r, b };
    };

    const boxElement = document.querySelector('#box1');
    const startTime = performance.now();
    const duration = 5000;

    const update = currentTime => {
      const timeSpent = currentTime - startTime;
      const timeFactor = timeSpent / duration;

      const blend = blendColors(colorRGB_R, colorRGB_B, timeFactor);
      console.log(blend);

      boxElement.style.backgroundColor = `rgb(${blend.r},0,${blend.b})`;

      if (timeFactor < 1) {
        requestAnimationFrame(update);
      }
    }
    requestAnimationFrame(update);
  </script>
</body>

</html>
